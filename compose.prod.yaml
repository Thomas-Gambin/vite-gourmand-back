
services:
  php:
    build:
      context: .
      target: prod
    environment:
      SERVER_NAME: ${SERVER_NAME:-localhost}
      APP_ENV: prod
      APP_DEBUG: 0
      APP_SECRET: ${APP_SECRET:?APP_SECRET is required}
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@database:5432/${POSTGRES_DB:-app}?serverVersion=${POSTGRES_VERSION:-16}&charset=utf8
      MAILER_DSN: ${MAILER_DSN:-null://null}
      WAIT_FOR_DB: "false"
      RUN_MIGRATIONS: "false"
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"

  database:
    ports: !reset []
